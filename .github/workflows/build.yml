name: Build

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        run: swift test

      - name: Build app
        run: >
          xcodebuild
          -project LightSwitcher.xcodeproj
          -scheme LightSwitcher
          -configuration Debug
          -derivedDataPath DerivedData
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent DerivedData/Build/Products/Debug/LightSwitcher.app LightSwitcher-dev.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightSwitcher-dev
          path: LightSwitcher-dev.zip
